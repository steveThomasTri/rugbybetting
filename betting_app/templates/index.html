{% extends "base.html" %}

{% block content %}
<h2>Leaderboard</h2>

<table class="leaderboard-table">
    <tr>
        <th>Name</th>
        <th>Total Bank</th>
    </tr>
    {% for p in players %}
    <tr>
        <td>
            <a href="{{ url_for('player', id=p[0]) }}">
                {{ p[1] }}
            </a>
        </td>
        <td>$<span class="leaderboard-numbers">{{ "%.2f"|format(p[4]) }}</span></td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
