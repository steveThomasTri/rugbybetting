<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betting Tracker</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
    body {
        background: linear-gradient(to bottom, #0a0f1c, #05070d);
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    @font-face {
        font-family: 'SportsType';
        src: url('/static/fonts/Sports Type Full.woff2') format('woff2');
    }

    .leaderboard-numbers{
        font-family: 'SportsType', sans-serif;
    }

    /* Container */
    .container {
        max-width: 900px;
    }

    /* Leaderboard Table */
    .leaderboard-table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(20, 30, 60, 0.6);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 150, 255, 0.2);
        font-size: 1.5em;
    }

    /* Header */
    .leaderboard-table th {
        text-align: left;
        padding: 15px;
        background: rgba(0, 100, 255, 0.2);
        color: #66ccff;
        font-weight: 600;
        letter-spacing: 1px;
    }

    /* Rows */
    .leaderboard-table td {
        padding: 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* Hover effect */
    .leaderboard-table tr:hover {
        background: rgba(0, 150, 255, 0.1);
        transition: 0.2s ease;
    }

    /* Links */
    .leaderboard-table a {
        color: #66ccff;
        text-decoration: none;
    }

    .leaderboard-table a:hover {
        text-decoration: underline;
    }

    /* Alternating row glow */
    .leaderboard-table tr:nth-child(even) {
        background: rgba(255, 255, 255, 0.02);
    }

    /* Title styling */
    h2 {
        margin-bottom: 20px;
        color: #66ccff;
        text-shadow: 0 0 10px rgba(0, 150, 255, 0.5);
    }

    .transaction-table th, .transaction-table td {
        padding: 18px 24px;
    }
</style>

</head>
<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Betting Tracker</a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
                <a class="nav-link" href="/">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/transactions">Transactions</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/add">Add Bet</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/review">Review Pending</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/leaderboard">Leaderboard</a>
            </li>
        </ul>
    </div>
</div>

</nav>

<!-- Main Content -->

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS (optional but useful) -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
